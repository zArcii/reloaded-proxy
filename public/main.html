<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloaded Proxy</title>

    <script src="scram/scramjet.all.js"></script>
    <script src="baremux/index.js"></script>
    <link rel="shortcut icon" href="favicon.png" />

    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --accent-color: #ffffff;
            --bg-glow: rgba(255, 255, 255, 0.05);
            --star-color: #ffffff;
            --text-color: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.4);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            position: relative;
        }

        /* Black/White Space Theme */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--star-color), 0 0 20px var(--star-color);
            animation: twinkle var(--duration, 4s) infinite ease-in-out alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .glowing-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--bg-glow) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: pulse 6s infinite ease-in-out alternate;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        /* Floating Oval Sidebar/Taskbar */
        .floating-sidebar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            gap: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-item {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 20px;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 500;
            gap: 10px;
            white-space: nowrap;
        }

        .side-item i {
            font-size: 1.2rem;
        }

        .side-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .side-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Tab System at Top */
        .nav-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 90%;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-sizing: border-box;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .nav-container.hidden {
            transform: translate(-50%, -100px);
            opacity: 0;
        }

        .tabs-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 2px;
        }

        .tab {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            min-width: 100px;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: #fff;
        }

        /* Multi-Window Content */
        .window {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .window.active {
            display: flex;
        }

        /* Browser Window */
        .content-container {
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Chat Window */
        .chat-container {
            padding-bottom: 100px;
            padding-top: 50px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chat-box {
            width: 80%;
            max-width: 900px;
            height: 70vh;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .chat-sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .msg-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px 20px;
            color: white;
            outline: none;
        }

        .room-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .room-item:hover,
        .room-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Others */
        .proxy-title {
            font-size: 3.5rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .search-container {
            width: 50vw;
            max-width: 600px;
        }

        #sj-address {
            width: 100%;
            height: 60px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        #sj-address:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .frame-container {
            position: fixed;
            inset: 0;
            top: 0;
            z-index: 500;
            background: #fff;
            display: none;
        }

        .frame-container.active {
            display: block;
        }

        /* Settings Modal Overhaul */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
        }

        .btn-send {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="stars" id="stars"></div>
    <div class="glowing-bg"></div>

    <!-- Floating Oval Navigation -->
    <div class="floating-sidebar">
        <div class="side-item active" onclick="switchWindow('browser')">
            <span>Web Browser</span>
        </div>
        <div class="side-item" onclick="switchWindow('chat')">
            <span>Reloaded Chat</span>
        </div>
        <div class="side-item" onclick="toggleSettings()">
            <span>Settings</span>
        </div>
    </div>

    <!-- Top Tab Bar (Only for Browser) -->
    <nav class="nav-container" id="browser-tabs-nav">
        <div class="tabs-list" id="tabs-list"></div>
        <button class="add-tab-btn" id="add-tab">+</button>
    </nav>

    <!-- Browser Window -->
    <div id="window-browser" class="window window-browser active">
        <div class="content-container active" id="main-content">
            <h1 class="proxy-title">Reloaded</h1>
            <form id="sj-form" class="search-container">
                <input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
                <input id="sj-address" type="text" placeholder="Search the web freely..." autocomplete="off" />
            </form>
        </div>
        <div id="frames-container"></div>
    </div>

    <!-- Chat Window -->
    <div id="window-chat" class="window window-chat">
        <div class="chat-container">
            <div class="chat-box">
                <div class="chat-sidebar">
                    <h3 style="font-weight: 200; letter-spacing: 2px; margin-bottom: 20px;">ROOMS</h3>
                    <div class="room-item active">Public Square</div>
                    <div class="room-item">Gaming Room</div>
                    <div class="room-item">Dev Chat</div>
                    <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05);">
                        <div class="room-item" style="color: var(--accent-color);">+ Create Private</div>
                    </div>
                </div>
                <div class="chat-main">
                    <div class="chat-messages" id="chat-messages">
                        <div style="opacity: 0.5; font-size: 0.8rem; text-align: center;">Welcome to Reloaded Public
                            Chat</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="msg-input" placeholder="Type a message..." id="msg-input">
                        <button class="btn-send">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h2 style="font-weight: 200; letter-spacing: 5px; text-align: center; margin-bottom: 30px;">SETTINGS</h2>
            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 15px;">ACCENT
                    COLOR</label>
                <div style="display: flex; gap: 10px;" id="accent-colors">
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#ffffff;cursor:pointer;"
                        data-color="#ffffff"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#8ab4f8;cursor:pointer;"
                        data-color="#8ab4f8"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#f88ab4;cursor:pointer;"
                        data-color="#f88ab4"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#b4f88a;cursor:pointer;"
                        data-color="#b4f88a"></div>
                </div>
            </div>
            <button onclick="toggleSettings()"
                style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }
        createStars();

        function switchWindow(type) {
            document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.side-item').forEach(i => i.classList.remove('active'));

            document.getElementById(`window-${type}`).classList.add('active');
            event.currentTarget.classList.add('active');

            const tabNav = document.getElementById('browser-tabs-nav');
            if (type === 'browser') tabNav.classList.remove('hidden');
            else tabNav.classList.add('hidden');
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        document.querySelectorAll('.color-option').forEach(opt => {
            opt.onclick = () => {
                const color = opt.dataset.color;
                document.documentElement.style.setProperty('--accent-color', color);
                document.documentElement.style.setProperty('--star-color', color);
            };
        });
    </script>
</body>

</html>
