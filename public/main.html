<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloaded Proxy</title>

    <script src="scram/scramjet.all.js"></script>
    <script src="baremux/index.js"></script>
    <link rel="shortcut icon" href="favicon.png" />

    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --accent-color: #ffffff;
            --bg-glow: rgba(255, 255, 255, 0.05);
            --star-color: #ffffff;
            --text-color: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.4);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            position: relative;
        }

        /* Black/White Space Theme */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--star-color), 0 0 20px var(--star-color);
            animation: twinkle var(--duration, 4s) infinite ease-in-out alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .glowing-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--bg-glow) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: pulse 6s infinite ease-in-out alternate;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        /* Floating Sidebar (Dock) Fix */
        .floating-sidebar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            height: 65px;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 2000;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
            gap: 8px;
        }

        .side-item {
            height: 44px;
            padding: 0 24px;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .side-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .side-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Tab System at Top */
        .nav-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 90%;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-sizing: border-box;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .nav-container.hidden {
            transform: translate(-50%, -100px);
            opacity: 0;
        }

        .tabs-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 2px;
        }

        .tab {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            min-width: 100px;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: #fff;
        }

        /* Content Area Alignment Fix */
        /* Animated Gradient Backgrounds */
        .theme-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            transition: opacity 1s ease;
        }

        /* Space Theme (Default) */
        .theme-space .stars {
            display: block;
        }

        .theme-space .glowing-bg {
            display: block;
        }

        /* Cyberpunk Theme */
        .theme-cyberpunk {
            background: linear-gradient(45deg, #0d001a, #1a0033);
        }

        .theme-cyberpunk::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 255, 0.1), transparent 70%);
            animation: cyberpunkPulse 8s infinite alternate;
        }

        @keyframes cyberpunkPulse {
            0% {
                opacity: 0.3;
                transform: scale(0.8);
            }

            100% {
                opacity: 0.7;
                transform: scale(1.2);
            }
        }

        /* Matrix Theme */
        .theme-matrix {
            background: #000;
            overflow: hidden;
        }

        .matrix-canvas {
            position: absolute;
            inset: 0;
            opacity: 0.15;
        }

        /* Knight Theme */
        .theme-knight {
            background: url('knight_ground_theme_bg_1772528361552.png') no-repeat center center/cover;
            filter: brightness(0.6);
        }

        .theme-knight::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.1), transparent 60%);
            animation: knightBreathe 5s infinite alternate;
        }

        @keyframes knightBreathe {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* Centering Fixes */
        .window.active {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            max-width: none;
            margin: 0;
            padding: 0;
            position: relative;
            z-index: 20;
        }

        .proxy-title {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 20px;
            margin: 0 0 2rem 0;
            padding-left: 20px;
            /* Offset for letter-spacing to center text block */
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        .search-container {
            width: 60vw;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        #sj-address {
            width: 100%;
            height: 75px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            font-size: 1.5rem;
            outline: none;
            backdrop-filter: blur(30px) saturate(180%);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        #sj-address:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            transform: scale(1.03) translateY(-5px);
        }

        /* Hide UI Button */
        .hide-ui-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5000;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hide-ui-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .hide-ui-btn.active {
            opacity: 0.3;
        }

        .ui-hidden {
            display: none !important;
        }

        .frame-container {
            position: fixed;
            inset: 0;
            top: 0;
            z-index: 500;
            background: #fff;
            display: none;
        }

        .frame-container.active {
            display: block;
        }

        .frame-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Improved Add Tab Button */
        .add-tab-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .add-tab-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .add-tab-btn svg {
            transition: transform 0.3s;
        }

        .add-tab-btn:hover svg {
            transform: rotate(90deg);
        }

        /* Settings Modal Overhaul */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="stars" id="stars"></div>
    <div class="glowing-bg"></div>

    <!-- Floating Oval Navigation -->
    <div class="floating-sidebar" id="main-dock">
        <div class="side-item active">
            <span>Web Browser</span>
        </div>
        <div class="side-item" onclick="toggleSettings()">
            <span>Settings</span>
        </div>
    </div>

    <!-- Top Tab Bar -->
    <nav class="nav-container" id="browser-tabs-nav">
        <div class="tabs-list" id="tabs-list"></div>
        <button class="add-tab-btn" id="add-tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span>New Tab</span>
        </button>
    </nav>

    <!-- Hide UI Toggle -->
    <div class="hide-ui-btn" id="hide-ui-toggle" title="Toggle UI">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19">
            </path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
    </div>

    <!-- Browser Window -->
    <div id="window-browser" class="window active">
        <div class="content-container active" id="main-content">
            <h1 class="proxy-title">Reloaded</h1>
            <form id="sj-form" class="search-container">
                <input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
                <input id="sj-address" type="text" placeholder="Search the web freely..." autocomplete="off" />
            </form>
        </div>
        <div id="frames-container"></div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 12px;">ACTIVE
                    THEME</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="theme-btn" onclick="setTheme('space')">Space</button>
                    <button class="theme-btn" onclick="setTheme('cyberpunk')">Cyberpunk</button>
                    <button class="theme-btn" onclick="setTheme('matrix')">Matrix</button>
                    <button class="theme-btn" onclick="setTheme('knight')">Knight</button>
                </div>
            </div>

            <style>
                .theme-btn {
                    background: rgba(255, 255, 255, 0.05);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    color: white;
                    padding: 8px;
                    border-radius: 10px;
                    cursor: pointer;
                    font-size: 0.8rem;
                    transition: all 0.3s;
                }

                .theme-btn:hover {
                    background: rgba(255, 255, 255, 0.1);
                    border-color: #fff;
                }
            </style>

            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 15px;">ACCENT
                    COLOR</label>
                <div style="display: flex; gap: 10px;" id="accent-colors">
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#ffffff;cursor:pointer;"
                        data-color="#ffffff"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#8ab4f8;cursor:pointer;"
                        data-color="#8ab4f8"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#f88ab4;cursor:pointer;"
                        data-color="#f88ab4"></div>
                    <div class="color-option"
                        style="width:30px;height:30px;border-radius:50%;background:#b4f88a;cursor:pointer;"
                        data-color="#b4f88a"></div>
                </div>
            </div>
            <button onclick="toggleSettings()"
                style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }
        createStars();

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // Hide UI Toggle Logic
        const hideBtn = document.getElementById('hide-ui-toggle');
        const mainDock = document.getElementById('main-dock');
        const tabNav = document.getElementById('browser-tabs-nav');

        hideBtn.addEventListener('click', () => {
            const isHidden = mainDock.classList.toggle('ui-hidden');
            tabNav.classList.toggle('ui-hidden');
            hideBtn.classList.toggle('active');

            // Update icon based on state
            if (isHidden) {
                hideBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            } else {
                hideBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            }
        });

        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
            localStorage.setItem('reloaded-theme', theme);

            // Cleanup matrix if exists
            const existingCanvas = document.querySelector('.matrix-canvas');
            if (existingCanvas) existingCanvas.remove();

            if (theme === 'matrix') {
                initMatrix();
            }
        }

        function initMatrix() {
            const canvas = document.createElement('canvas');
            canvas.className = 'matrix-canvas';
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコサシスセソタチツテト';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0F0';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('reloaded-theme') || 'space';
        setTheme(savedTheme);

        document.querySelectorAll('.color-option').forEach(opt => {
            opt.onclick = () => {
                const color = opt.dataset.color;
                document.documentElement.style.setProperty('--accent-color', color);
                document.documentElement.style.setProperty('--star-color', color);
            };
        });
    </script>
</body>

</html>

</html>
