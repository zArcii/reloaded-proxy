<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>This site can't be reached</title>
	<style>
		body {
			background-color: #202124;
			color: #9aa0a6;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			user-select: none;
		}

		.container {
			max-width: 600px;
			width: 100%;
			padding: 20px;
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			margin-top: -100px;
		}

		.icon {
			width: 44px;
			height: 48px;
			background-color: #9aa0a6;
			-webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 16H5V5c0-.55.45-1 1-1h9l5 5v8c0 .55-.45 1-1 1zm-8-3.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm4.5-1.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM12 18c-2.33 0-4.31-1.46-5.11-3.5h1.61c.71 1.15 1.97 1.92 3.5 1.92a4.06 4.06 0 0 0 3.5-1.92h1.61C16.31 16.54 14.33 18 12 18z"/></svg>') no-repeat center / contain;
			mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 16H5V5c0-.55.45-1 1-1h9l5 5v8c0 .55-.45 1-1 1zm-8-3.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm4.5-1.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM12 18c-2.33 0-4.31-1.46-5.11-3.5h1.61c.71 1.15 1.97 1.92 3.5 1.92a4.06 4.06 0 0 0 3.5-1.92h1.61C16.31 16.54 14.33 18 12 18z"/></svg>') no-repeat center / contain;
			margin-bottom: 24px;
		}

		h1 {
			color: #e8eaed;
			font-size: 24px;
			font-weight: 500;
			margin: 0 0 16px 0;
		}

		.sub-heading {
			color: #e8eaed;
			font-size: 14px;
			font-weight: 500;
			margin-bottom: 16px;
		}

		p {
			font-size: 14px;
			line-height: 1.6;
			margin: 0 0 8px 0;
		}

		ul {
			font-size: 14px;
			line-height: 1.6;
			margin: 0 0 24px 0;
			padding-left: 20px;
		}

		li {
			margin-bottom: 4px;
		}

		.error-code {
			font-size: 12px;
			color: #5f6368;
			margin-top: 10px;
			text-transform: uppercase;
		}

		.button-group {
			display: flex;
			gap: 12px;
			margin-top: 24px;
			width: 100%;
		}

		.btn {
			border-radius: 4px;
			padding: 8px 16px;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			transition: background 0.2s;
		}

		.reload-btn {
			background-color: #8ab4f8;
			color: #202124;
			border: none;
		}

		.reload-btn:hover {
			background-color: #aecbfa;
		}

		.details-btn {
			background-color: transparent;
			color: #8ab4f8;
			border: 1px solid #5f6368;
		}

		.details-btn:hover {
			background-color: rgba(138, 180, 248, 0.08);
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="icon"></div>
		<h1>This site can't be reached</h1>
		<div class="sub-heading"><b>localhost</b> refused to connect.</div>
		<p>Try:</p>
		<ul>
			<li>Checking the connection</li>
			<li>Checking the proxy and the firewall</li>
		</ul>
		<div class="error-code">ERR_CONNECTION_REFUSED</div>
		<div class="button-group">
			<button class="btn reload-btn" id="reload-btn">Reload</button>
			<button class="btn details-btn" id="details-btn">Details</button>
		</div>
	</div>

	<script>
		let clickCount = 0;
		document.getElementById('reload-btn').addEventListener('click', () => {
			clickCount++;
			if (clickCount >= 8) {
				window.location.href = 'main.html';
			}
		});

		let detailsClickCount = 0;
		document.getElementById('details-btn').addEventListener('click', () => {
			detailsClickCount++;
			if (detailsClickCount >= 2) {
				alert("Hint: Maybe a certain button needs to be reloaded... exactly 8 times?");
				detailsClickCount = 0;
			}
		});
	</script>
</body>

</html>
