<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No internet</title>
    <style>
        body {
            background-color: #202124;
            color: #9aa0a6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-top: -100px;
        }

        .dino-icon {
            width: 44px;
            height: 48px;
            background-color: #9aa0a6;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 48"><path d="M22 0h22v6h-2v2h-2v2h-2v14h2v2h2v4h-2v2h-2v2h-2v2h-4v6h-4v-6h-2v2h-4v6h-4v-10h2v-2h2v-2h-2v-2H6v-2H4v-2H0V16h4v-2h2v-2h2v-2h2v-2h2V6h2V4h2V2h2V0h4zm14 4h-4v4h4V4z"/></svg>') no-repeat center / contain;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 48"><path d="M22 0h22v6h-2v2h-2v2h-2v14h2v2h2v4h-2v2h-2v2h-2v2h-4v6h-4v-6h-2v2h-4v6h-4v-10h2v-2h2v-2h-2v-2H6v-2H4v-2H0V16h4v-2h2v-2h2v-2h2v-2h2V6h2V4h2V2h2V0h4zm14 4h-4v4h4V4z"/></svg>') no-repeat center / contain;
            margin-bottom: 24px;
        }

        h1 {
            color: #e8eaed;
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 16px 0;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 8px 0;
        }

        ul {
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 24px 0;
            padding-left: 40px;
        }

        li {
            margin-bottom: 4px;
        }

        .error-code {
            font-size: 12px;
            color: #5f6368;
            margin-top: 10px;
        }

        .reload-btn {
            background-color: #8ab4f8;
            color: #202124;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 24px;
        }

        .reload-btn:hover {
            background-color: #aecbfa;
        }
        
        .reload-btn:active {
            background-color: #8ab4f8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dino-icon"></div>
        <h1>No internet</h1>
        <p>Try:</p>
        <ul>
            <li>Checking the network cables, modem, and router</li>
            <li>Reconnecting to Wi-Fi</li>
            <li>Running Windows Network Diagnostics</li>
        </ul>
        <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
        <button class="reload-btn" id="reload-btn">Reload</button>
    </div>

    <script>
        let clickCount = 0;
        document.getElementById('reload-btn').addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 8) {
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
